<!-- SAVE AS: src/partials/hero.html -->
<section id="hero" class="hero" aria-label="Hero">

    <!-- Background video -->
    <div class="hero__bg" aria-hidden="true">
        <video class="hero__video" autoplay muted loop playsinline poster="/images/hero-poster.jpg">
            <!-- Replace src with your actual video file in /public/images/ -->
            <source src="/images/hero-reel.mp4" type="video/mp4" />
        </video>
        <div class="hero__grain"></div>
        <!-- Gradient vignette -->
        <div style="position:absolute;inset:0;
      background:linear-gradient(to right,
        hsl(var(--color-bg)/0.8) 0%,
        hsl(var(--color-bg)/0.2) 60%,
        transparent 100%),
      linear-gradient(to top,
        hsl(var(--color-bg)/0.95) 0%,
        transparent 50%);">
        </div>
    </div>

    <!-- Content -->
    <div class="hero__content">

        <div class="hero__eyebrow will-animate">
            <div class="hero__eyebrow-line"></div>
            <span class="label">fabrica® Studio — Est. 2016</span>
        </div>

        <h1 class="hero__title">
            <span class="hero__title-line will-animate">No generic</span>
            <em class="hero__title-line will-animate">websites.</em>
            <span class="hero__title-line will-animate">Just growth.</span>
        </h1>

        <p class="hero__subtitle will-animate">
            Web design, branding, and digital marketing built around your goals —
            not ours. Tools and strategies that make your business shine.
        </p>

        <div class="hero__actions will-animate">
            <a href="#work" class="btn btn--primary magnetic" data-magnetic>
                View our work
                <span class="btn__arrow" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8h10M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </span>
            </a>
            <a href="#contact" class="btn btn--ghost">
                Let's talk →
            </a>
        </div>

        <!-- Floating team card -->
        <div class="will-animate" style="
      margin-top: var(--space-3xl);
      display: inline-flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm) var(--space-lg);
      background: hsl(var(--color-bg-surface)/0.8);
      backdrop-filter: blur(12px);
      border: 1px solid hsl(var(--color-border-subtle));
      border-radius: 100px;
      width: fit-content;">
            <img src="/images/lauren-thompson.jpg" alt="Lauren Thompson, Team Lead" width="32" height="32"
                style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;">
            <div>
                <div style="font-size:var(--text-xs);font-weight:var(--weight-medium);
                    color:hsl(var(--color-fg));">Lauren Thompson</div>
                <div class="label" style="margin-top:2px;">Team Lead at fabrica®</div>
            </div>
            <a href="mailto:hello@fabrica.com" style="
        font-size: var(--text-xs);
        font-weight: var(--weight-medium);
        letter-spacing: var(--tracking-wide);
        color: hsl(var(--color-fg-muted));
        padding: var(--space-2xs) var(--space-sm);
        border: 1px solid hsl(var(--color-border));
        border-radius: 100px;
        transition: color var(--duration-fast), border-color var(--duration-fast);"
                onmouseover="this.style.color='hsl(var(--color-fg))';this.style.borderColor='hsl(var(--color-fg))'"
                onmouseout="this.style.color='';this.style.borderColor=''">
                Ask directly →
            </a>
        </div>

    </div>

    <!-- Scroll hint -->
    <div class="hero__scroll-hint will-animate" aria-hidden="true">
        <span>Scroll</span>
        <div class="hero__scroll-line"></div>
    </div>

</section>
